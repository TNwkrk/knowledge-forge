name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - converted_to_draft

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify change scope
        id: classify
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "classification=code-affecting" >> "$GITHUB_OUTPUT"
            echo "ci_mode=full" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"

          mapfile -t changed_files < <(git diff --name-only "$base_sha" "$head_sha")

          echo "Changed files:"
          printf ' - %s\n' "${changed_files[@]}"

          docs_only=true
          for path in "${changed_files[@]}"; do
            [[ -z "$path" ]] && continue
            case "$path" in
              *.md) ;;
              *)
                docs_only=false
                break
                ;;
            esac
          done

          if [[ "$docs_only" == "true" ]]; then
            echo "classification=docs-only" >> "$GITHUB_OUTPUT"
            echo "ci_mode=docs-only" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.pull_request.draft }}" == "true" ]]; then
            echo "classification=code-affecting" >> "$GITHUB_OUTPUT"
            echo "ci_mode=preflight" >> "$GITHUB_OUTPUT"
          else
            echo "classification=code-affecting" >> "$GITHUB_OUTPUT"
            echo "ci_mode=full" >> "$GITHUB_OUTPUT"
          fi

      - name: Report CI mode
        run: |
          echo "Classification: ${{ steps.classify.outputs.classification }}"
          echo "CI mode: ${{ steps.classify.outputs.ci_mode }}"

      - name: Set up Python
        if: ${{ steps.classify.outputs.ci_mode != 'docs-only' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: ${{ steps.classify.outputs.ci_mode != 'docs-only' }}
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff check
        if: ${{ steps.classify.outputs.ci_mode != 'docs-only' }}
        run: ruff check .

      - name: Run Ruff format check
        if: ${{ steps.classify.outputs.ci_mode == 'full' }}
        run: ruff format --check .

      - name: Run pytest with coverage
        if: ${{ steps.classify.outputs.ci_mode == 'full' }}
        run: pytest --cov=knowledge_forge --cov-report=term-missing

      - name: Complete docs-only fast pass
        if: ${{ steps.classify.outputs.ci_mode == 'docs-only' }}
        run: echo "Docs-only pull request detected; skipping Python setup and test work."
