# Knowledge Forge inference configuration.
# Environment variables prefixed with KNOWLEDGE_FORGE_OPENAI_ override these
# values. The API key itself is read from the env var named below.

openai:
  api_key_env: OPENAI_API_KEY

  # Default routing for direct requests and future extraction / compilation work.
  default_model: gpt-4o
  extraction_model: gpt-4o
  compilation_model: gpt-4o

  # Deterministic defaults keep extraction and compilation predictable.
  temperature: 0.0
  max_tokens: 4096

  rate_limit:
    max_requests_per_minute: 500
    max_tokens_per_minute: 30000

  batch:
    max_batch_size: 50000
    poll_interval_seconds: 60
    max_poll_duration_seconds: 86400

  extraction:
    # The durable extraction scheduler can be switched at runtime through
    # config, env overrides, or CLI flags such as:
    #   --strategy batch
    #   --max-tokens-per-minute 30000
    strategy: direct_serial
    direct_concurrency: 1
    batch_chunk_size: 25
    token_estimate_chars_per_token: 4.0
    dispatch_cooldown_seconds: 15.0
    model_routing:
      rules: []

  pricing:
    gpt-4o:
      input_per_million_tokens: 2.50
      output_per_million_tokens: 10.00
    gpt-4o-mini:
      input_per_million_tokens: 0.15
      output_per_million_tokens: 0.60
    gpt-4.1:
      input_per_million_tokens: 2.00
      output_per_million_tokens: 8.00
    gpt-4.1-mini:
      input_per_million_tokens: 0.40
      output_per_million_tokens: 1.60
