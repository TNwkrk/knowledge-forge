# Knowledge Forge inference configuration placeholder.
# Populate concrete values when the inference layer is implemented.

openai:
  # Environment variable that holds the API key.
  api_key_env: OPENAI_API_KEY

  # Default model routing. Override per operation only when needed.
  default_model: ""
  extraction_model: ""
  compilation_model: ""

  # Deterministic extraction defaults belong here.
  temperature: 0.0
  max_tokens: 0

  rate_limit:
    max_requests_per_minute: 0
    max_tokens_per_minute: 0

  batch:
    max_batch_size: 0
    poll_interval_seconds: 0
    max_poll_duration_seconds: 0

# Future pricing, retry, or prompt overrides should follow the shapes described
# in docs/inference-layer.md rather than inventing a parallel config format.
