# Knowledge Forge inference configuration.
# Environment variables prefixed with KNOWLEDGE_FORGE_OPENAI_ override these
# values. The API key itself is read from the env var named below.

openai:
  api_key_env: OPENAI_API_KEY

  # Default routing for direct requests and future extraction / compilation work.
  default_model: gpt-4o
  extraction_model: gpt-4o
  compilation_model: gpt-4o

  # Deterministic defaults keep extraction and compilation predictable.
  temperature: 0.0
  max_tokens: 4096

  rate_limit:
    max_requests_per_minute: 500
    max_tokens_per_minute: 150000

  batch:
    max_batch_size: 50000
    poll_interval_seconds: 60
    max_poll_duration_seconds: 86400
